<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <title>Sections 9-11: reuse one block for repetitive structure; recombine different blocks when the task needs two operations</title>
  <rect x="0" y="0" width="820" height="300" fill="#ffffff"/>
  <text x="20" y="28" font-size="16" font-weight="600" fill="#1e293b">9-11 · Reuse vs recombination: clone a working block; recombine when you need a new part</text>

  <!-- two-op task geometry -->
  <text x="20" y="66" font-size="13" font-weight="600" fill="#334155">the two-operation task (needs both):</text>
  <g transform="translate(40,78)">
    <g stroke="#cbd5e1" fill="#f8fafc">
      <rect x="0" y="0" width="22" height="22"/>
      <rect x="22" y="0" width="22" height="22" fill="#0d9488"/><rect x="44" y="0" width="22" height="22" fill="#e76f51"/><rect x="66" y="0" width="22" height="22" fill="#0d9488"/>
      <rect x="88" y="0" width="22" height="22"/><rect x="110" y="0" width="22" height="22"/><rect x="132" y="0" width="22" height="22"/><rect x="154" y="0" width="22" height="22"/>
      <rect x="176" y="0" width="22" height="22"/><rect x="198" y="0" width="22" height="22"/><rect x="220" y="0" width="22" height="22" fill="#0d9488"/>
      <rect x="242" y="0" width="22" height="22"/>
    </g>
    <g font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">
      <text x="33" y="16">+</text><text x="55" y="16">&#8211;</text><text x="77" y="16">+</text><text x="231" y="16">+</text>
    </g>
    <text x="55" y="40" font-size="11" fill="#334155" text-anchor="middle">fine motif (+ &#8211; +), adjacent</text>
    <text x="55" y="53" font-size="10.5" fill="#94a3b8" text-anchor="middle">needs dilation 1</text>
    <text x="231" y="40" font-size="11" fill="#334155" text-anchor="middle">far spike, distance s</text>
    <text x="231" y="53" font-size="10.5" fill="#94a3b8" text-anchor="middle">needs reach (dilation 3)</text>
  </g>

  <!-- reuse fails -->
  <g transform="translate(40,180)">
    <text x="0" y="-6" font-size="12.5" font-weight="600" fill="#64748b">reuse: identical blocks</text>
    <rect x="0" y="4" width="46" height="34" rx="4" fill="#eef2f6" stroke="#94a3b8"/><text x="23" y="26" font-size="14" fill="#334155" text-anchor="middle">d3</text>
    <rect x="54" y="4" width="46" height="34" rx="4" fill="#eef2f6" stroke="#94a3b8"/><text x="77" y="26" font-size="14" fill="#334155" text-anchor="middle">d3</text>
    <rect x="108" y="4" width="46" height="34" rx="4" fill="#eef2f6" stroke="#94a3b8"/><text x="131" y="26" font-size="14" fill="#334155" text-anchor="middle">d3</text>
    <text x="180" y="26" font-size="15" fill="#e76f51">&#10007; blind to fine motif (0/24)</text>
  </g>

  <!-- recombine solves -->
  <g transform="translate(40,240)">
    <text x="0" y="-6" font-size="12.5" font-weight="600" fill="#0d9488">recombine: different blocks</text>
    <rect x="0" y="4" width="46" height="34" rx="4" fill="#ccfbf1" stroke="#0d9488"/><text x="23" y="26" font-size="14" fill="#0f766e" text-anchor="middle">d1</text>
    <rect x="54" y="4" width="46" height="34" rx="4" fill="#ccfbf1" stroke="#0d9488"/><text x="77" y="26" font-size="14" fill="#0f766e" text-anchor="middle">d3</text>
    <text x="180" y="26" font-size="15" fill="#0d9488">&#10003; fine + reach (24/24)</text>
  </g>

  <!-- biology tie -->
  <g transform="translate(560,90)">
    <rect x="0" y="0" width="230" height="180" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="115" y="26" font-size="12.5" font-weight="600" fill="#334155" text-anchor="middle">the same trade-off in nature</text>
    <text x="16" y="54" font-size="11.5" fill="#0d9488" font-weight="600">clone &#8594; scale</text>
    <text x="16" y="72" font-size="11" fill="#64748b">runners, rhizomes, mycelium:</text>
    <text x="16" y="88" font-size="11" fill="#64748b">repeat a working module, no search</text>
    <text x="16" y="118" font-size="11.5" fill="#e76f51" font-weight="600">recombine &#8594; new part</text>
    <text x="16" y="136" font-size="11" fill="#64748b">sexual reproduction: expensive</text>
    <text x="16" y="152" font-size="11" fill="#64748b">search, only when more-of-the-same</text>
    <text x="16" y="168" font-size="11" fill="#64748b">will not do</text>
  </g>

  <text x="20" y="292" font-size="11.5" fill="#94a3b8">A staged searcher (Sec. 11) clones by default and recombines only when cloning stalls — and matches or beats both fixed strategies.</text>
</svg>
