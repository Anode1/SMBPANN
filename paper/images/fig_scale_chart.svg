<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <title>Weight-sharing (one tiled block) stays flat as input size grows while a locally-connected baseline falls to chance</title>
  <rect x="0" y="0" width="720" height="420" fill="#ffffff"/>
  <text x="24" y="30" font-size="16" font-weight="600" fill="#1e293b">Weight-sharing vs a locally-connected baseline, as input size grows</text>
  <text x="24" y="49" font-size="12" fill="#64748b">translation-invariant motif, 32 train examples · mean of 250 seeds, error bars = ±1 SD</text>

  <!-- plot area: x 80..580, y 60..360 ; acc 0.5..1.0 -->
  <!-- gridlines + y labels -->
  <g stroke="#eef2f6"><line x1="80" y1="60" x2="580" y2="60"/><line x1="80" y1="160" x2="580" y2="160"/><line x1="80" y1="260" x2="580" y2="260"/></g>
  <g font-size="11" fill="#64748b" text-anchor="end">
    <text x="72" y="64">1.00</text><text x="72" y="164">0.83</text><text x="72" y="264">0.67</text><text x="72" y="364">0.50</text>
  </g>
  <!-- chance line at 0.5 (y=360) -->
  <line x1="80" y1="360" x2="580" y2="360" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="584" y="363" font-size="10.5" fill="#94a3b8">chance</text>
  <!-- axes -->
  <line x1="80" y1="60" x2="80" y2="360" stroke="#94a3b8"/>
  <line x1="80" y1="360" x2="580" y2="360" stroke="#94a3b8"/>
  <g font-size="11" fill="#64748b" text-anchor="middle">
    <text x="100" y="378">16</text><text x="190" y="378">32</text><text x="280" y="378">48</text><text x="370" y="378">64</text><text x="460" y="378">96</text><text x="550" y="378">128</text>
    <text x="330" y="398" font-size="12" fill="#475569">input size N (positions to cover)</text>
  </g>

  <!-- widening-gap shading between the two curves -->
  <polygon points="100,84.8 190,84.6 280,83.4 370,83.4 460,84.4 550,83 550,336 460,333 370,321 280,309 190,287 100,234.8"
           fill="#0d9488" opacity="0.07"/>

  <!-- SCRATCH (locally-connected) orange, falling -->
  <g stroke="#e76f51" stroke-width="1.5">
    <line x1="100" y1="208.4" x2="100" y2="261.2"/><line x1="190" y1="265.7" x2="190" y2="308.3"/><line x1="280" y1="293.4" x2="280" y2="324.6"/><line x1="370" y1="308.1" x2="370" y2="333.9"/><line x1="460" y1="324.6" x2="460" y2="341.4"/><line x1="550" y1="329.4" x2="550" y2="342.6"/>
  </g>
  <polyline points="100,234.8 190,287 280,309 370,321 460,333 550,336" fill="none" stroke="#e76f51" stroke-width="2.5"/>
  <g fill="#e76f51"><circle cx="100" cy="234.8" r="4"/><circle cx="190" cy="287" r="4"/><circle cx="280" cy="309" r="4"/><circle cx="370" cy="321" r="4"/><circle cx="460" cy="333" r="4"/><circle cx="550" cy="336" r="4"/></g>

  <!-- DEVELOP (weight-shared) teal, flat high -->
  <g stroke="#0d9488" stroke-width="1.5">
    <line x1="100" y1="67.4" x2="100" y2="102.2"/><line x1="190" y1="65.7" x2="190" y2="103.5"/><line x1="280" y1="62.1" x2="280" y2="104.7"/><line x1="370" y1="61.8" x2="370" y2="105"/><line x1="460" y1="63.4" x2="460" y2="105.4"/><line x1="550" y1="64.1" x2="550" y2="101.9"/>
  </g>
  <polyline points="100,84.8 190,84.6 280,83.4 370,83.4 460,84.4 550,83" fill="none" stroke="#0d9488" stroke-width="2.5"/>
  <g fill="#0d9488"><circle cx="100" cy="84.8" r="4"/><circle cx="190" cy="84.6" r="4"/><circle cx="280" cy="83.4" r="4"/><circle cx="370" cy="83.4" r="4"/><circle cx="460" cy="84.4" r="4"/><circle cx="550" cy="83" r="4"/></g>

  <!-- legend -->
  <g font-size="12">
    <line x1="360" y1="90" x2="384" y2="90" stroke="#0d9488" stroke-width="2.5"/><circle cx="372" cy="90" r="4" fill="#0d9488"/>
    <text x="392" y="94" fill="#0f766e" font-weight="600">weight-shared (one tiled block, 3 weights)</text>
    <line x1="360" y1="112" x2="384" y2="112" stroke="#e76f51" stroke-width="2.5"/><circle cx="372" cy="112" r="4" fill="#e76f51"/>
    <text x="392" y="116" fill="#c2410c">locally-connected (one filter per position)</text>
  </g>
  <text x="24" y="416" font-size="11" fill="#94a3b8">The shared block is size-independent; the local baseline starves and falls to chance — the gap widens, then saturates once it hits the floor.</text>
</svg>
