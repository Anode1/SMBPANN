<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<title>Emergent depth grows with the receptive field but overshoots it</title>
<rect x="0" y="0" width="560" height="320" fill="#ffffff"/>
<text x="20" y="26" font-size="15.5" font-weight="600" fill="#1e293b">Emergent depth grows with the required receptive field, but overshoots it</text>
<text x="20" y="44" font-size="11.5" fill="#64748b">test accuracy vs stack depth L, by required spike distance s; fair mean over 4 restarts, 30 seeds.</text>
