<text x="53" y="172.0" font-size="10.5" text-anchor="end" fill="#64748b">0.7</text>
<line x1="60" y1="121.0" x2="420" y2="121.0" stroke="#e2e8f0" stroke-width="1"/>
<text x="53" y="125.0" font-size="10.5" text-anchor="end" fill="#64748b">0.8</text>
<line x1="60" y1="74.0" x2="420" y2="74.0" stroke="#e2e8f0" stroke-width="1"/>
<text x="53" y="78.0" font-size="10.5" text-anchor="end" fill="#64748b">0.9</text>
<line x1="60" y1="97.5" x2="420" y2="97.5" stroke="#c56b3e" stroke-width="1.3" stroke-dasharray="5 4"/>
<text x="418" y="92.5" font-size="10" text-anchor="end" fill="#c56b3e">target 0.85 (never reached)</text>
<text x="60.0" y="278" font-size="10.5" text-anchor="middle" fill="#64748b">1</text>
<text x="150.0" y="278" font-size="10.5" text-anchor="middle" fill="#64748b">2</text>
<text x="240.0" y="278" font-size="10.5" text-anchor="middle" fill="#64748b">3</text>
<text x="330.0" y="278" font-size="10.5" text-anchor="middle" fill="#64748b">4</text>
<text x="420.0" y="278" font-size="10.5" text-anchor="middle" fill="#64748b">5</text>
<text x="240.0" y="294" font-size="11" text-anchor="middle" fill="#64748b">stack depth L</text>
<text transform="rotate(-90 22 168.0)" x="22" y="168.0" font-size="11" text-anchor="middle" fill="#64748b">test accuracy</text>
