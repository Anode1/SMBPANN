<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
<title>Directed search is tidier than random at equal task accuracy</title>
<rect x="0" y="0" width="820" height="300" fill="#ffffff"/>
<text x="20" y="27" font-size="16" font-weight="600" fill="#1e293b">Directed search finds a tidier filter than random, at the same task accuracy</text>
<text x="20" y="46" font-size="12" fill="#64748b">matched evaluation budget, 50 paired seeds; bands are ±1 SEM. GA wins on structure (what the objective rewards), ties on the task.</text>
<text x="70" y="72" font-size="12.5" font-weight="600" fill="#1e293b">Structure: contiguity of the filter</text>
<line x1="70" y1="230.0" x2="370" y2="230.0" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="234.0" font-size="10.5" text-anchor="end" fill="#64748b">0.3</text>
<line x1="70" y1="200.0" x2="370" y2="200.0" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="204.0" font-size="10.5" text-anchor="end" fill="#64748b">0.4</text>
<line x1="70" y1="170.0" x2="370" y2="170.0" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="174.0" font-size="10.5" text-anchor="end" fill="#64748b">0.5</text>
<line x1="70" y1="140.0" x2="370" y2="140.0" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="144.0" font-size="10.5" text-anchor="end" fill="#64748b">0.6</text>
<line x1="70" y1="110.0" x2="370" y2="110.0" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="114.0" font-size="10.5" text-anchor="end" fill="#64748b">0.7</text>
<line x1="70" y1="80.0" x2="370" y2="80.0" stroke="#e2e8f0" stroke-width="1"/>
<text x="64" y="84.0" font-size="10.5" text-anchor="end" fill="#64748b">0.8</text>
<text x="70.0" y="246" font-size="10.5" text-anchor="middle" fill="#64748b">12</text>
<text x="145.0" y="246" font-size="10.5" text-anchor="middle" fill="#64748b">16</text>
<text x="220.0" y="246" font-size="10.5" text-anchor="middle" fill="#64748b">20</text>
<text x="295.0" y="246" font-size="10.5" text-anchor="middle" fill="#64748b">24</text>
<text x="370.0" y="246" font-size="10.5" text-anchor="middle" fill="#64748b">28</text>
<text x="220.0" y="260" font-size="11" text-anchor="middle" fill="#64748b">input size N</text>
<text transform="rotate(-90 36 155.0)" x="36" y="155.0" font-size="11" text-anchor="middle" fill="#64748b">contiguity (taps / span)</text>
<polygon points="70.0,93.4 145.0,122.1 220.0,168.8 295.0,180.0 370.0,189.0 370.0,211.0 295.0,202.0 220.0,189.2 145.0,145.9 70.0,120.6" fill="rgba(197,107,62,0.12)" stroke="none"/>
<polygon points="70.0,87.8 145.0,103.7 220.0,107.5 295.0,142.7 370.0,157.6 370.0,170.4 295.0,161.3 220.0,130.5 145.0,128.3 70.0,114.2" fill="rgba(31,122,140,0.13)" stroke="none"/>
