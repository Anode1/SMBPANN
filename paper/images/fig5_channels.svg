<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <title>Sections 12-16: in 2-D, two operations (orientations) need two feature channels; the clean law breaks at three</title>
  <rect x="0" y="0" width="820" height="300" fill="#ffffff"/>
  <text x="20" y="28" font-size="16" font-weight="600" fill="#1e293b">12-16 · 2-D: two operations need two channels &#8212; and the law breaks at three</text>

  <!-- task grid: both orientations present -->
  <text x="40" y="66" font-size="12.5" font-weight="600" fill="#334155">task: both bars present?</text>
  <g transform="translate(40,78)">
    <g stroke="#e2e8f0" fill="#f8fafc">
      <rect x="0" y="0" width="120" height="120"/>
      <line x1="15" y1="0" x2="15" y2="120"/><line x1="30" y1="0" x2="30" y2="120"/><line x1="45" y1="0" x2="45" y2="120"/><line x1="60" y1="0" x2="60" y2="120"/><line x1="75" y1="0" x2="75" y2="120"/><line x1="90" y1="0" x2="90" y2="120"/><line x1="105" y1="0" x2="105" y2="120"/>
      <line x1="0" y1="15" x2="120" y2="15"/><line x1="0" y1="30" x2="120" y2="30"/><line x1="0" y1="45" x2="120" y2="45"/><line x1="0" y1="60" x2="120" y2="60"/><line x1="0" y1="75" x2="120" y2="75"/><line x1="0" y1="90" x2="120" y2="90"/><line x1="0" y1="105" x2="120" y2="105"/>
    </g>
    <!-- horizontal bar -->
    <rect x="15" y="30" width="45" height="15" fill="#0d9488"/>
    <!-- vertical bar -->
    <rect x="90" y="60" width="15" height="45" fill="#e76f51"/>
  </g>

  <!-- two channels / filters -->
  <text x="210" y="66" font-size="12.5" font-weight="600" fill="#334155">two channels = two detectors</text>
  <g transform="translate(210,84)">
    <g stroke="#cbd5e1" fill="#f1f5f9">
      <rect x="0" y="0" width="18" height="18"/><rect x="18" y="0" width="18" height="18"/><rect x="36" y="0" width="18" height="18"/>
      <rect x="0" y="18" width="18" height="18" fill="#0d9488"/><rect x="18" y="18" width="18" height="18" fill="#0d9488"/><rect x="36" y="18" width="18" height="18" fill="#0d9488"/>
      <rect x="0" y="36" width="18" height="18"/><rect x="18" y="36" width="18" height="18"/><rect x="36" y="36" width="18" height="18"/>
    </g>
    <text x="27" y="70" font-size="10.5" fill="#0d9488" text-anchor="middle">horizontal</text>
    <g transform="translate(90,0)" stroke="#cbd5e1" fill="#f1f5f9">
      <rect x="0" y="0" width="18" height="18"/><rect x="18" y="0" width="18" height="18" fill="#e76f51"/><rect x="36" y="0" width="18" height="18"/>
      <rect x="0" y="18" width="18" height="18"/><rect x="18" y="18" width="18" height="18" fill="#e76f51"/><rect x="36" y="18" width="18" height="18"/>
      <rect x="0" y="36" width="18" height="18"/><rect x="18" y="36" width="18" height="18" fill="#e76f51"/><rect x="36" y="36" width="18" height="18"/>
    </g>
    <text x="117" y="70" font-size="10.5" fill="#e76f51" text-anchor="middle">vertical</text>
  </g>

  <!-- crossover plot -->
  <g transform="translate(470,90)">
    <text x="110" y="-18" font-size="12.5" font-weight="600" fill="#334155" text-anchor="middle">accuracy vs channels (2-op task)</text>
    <line x1="0" y1="100" x2="220" y2="100" stroke="#94a3b8"/>
    <line x1="0" y1="0" x2="0" y2="100" stroke="#94a3b8"/>
    <text x="-8" y="4" font-size="10" fill="#64748b" text-anchor="end">1.0</text>
    <text x="-8" y="102" font-size="10" fill="#64748b" text-anchor="end">.70</text>
    <line x1="0" y1="50" x2="220" y2="50" stroke="#e76f51" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="222" y="53" font-size="10" fill="#e76f51">target</text>
    <polyline points="20,91.3 80,36.3 140,39.7 200,9.7" fill="none" stroke="#0d9488" stroke-width="2.5"/>
    <g fill="#0d9488"><circle cx="20" cy="91.3" r="4"/><circle cx="80" cy="36.3" r="4"/><circle cx="140" cy="39.7" r="4"/><circle cx="200" cy="9.7" r="4"/></g>
    <g font-size="10" fill="#64748b" text-anchor="middle"><text x="20" y="114">C1</text><text x="80" y="114">C2</text><text x="140" y="114">C3</text><text x="200" y="114">C4</text></g>
    <text x="20" y="86" font-size="10" fill="#64748b" text-anchor="middle">.73</text>
    <text x="86" y="30" font-size="10" fill="#0d9488" font-weight="600">.89 &#8593;</text>
  </g>

  <!-- breaks-at-3 note -->
  <g transform="translate(40,238)">
    <rect x="0" y="0" width="750" height="40" rx="6" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="14" y="18" font-size="12" font-weight="600" fill="#9a3412">one op &#8594; 1 channel &#183; two ops &#8594; 2 channels (C=1 caps at the 0.75 a single detector can reach)</text>
    <text x="14" y="34" font-size="11.5" fill="#c2410c">but the tidy &#8220;width = operations&#8221; law BREAKS at K=3: needs redundant channels, and three rescues (more channels, MLP head, 2nd conv layer) all failed.</text>
  </g>
</svg>
