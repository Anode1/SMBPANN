<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 270" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <title>Section 8: the emergent stack depth grows to match the receptive field the task requires</title>
  <rect x="0" y="0" width="820" height="270" fill="#ffffff"/>
  <text x="20" y="28" font-size="16" font-weight="600" fill="#1e293b">8 · Emergent depth matches the required receptive field</text>
  <text x="20" y="48" font-size="12.5" fill="#64748b">task: fire iff two spikes are exactly distance s apart &#8594; a unit must SEE BOTH &#8594; depth &#8805; s/2</text>

  <!-- input strip with two spikes -->
  <g transform="translate(40,86)">
    <text x="0" y="-6" font-size="12.5" font-weight="600" fill="#334155">input (s = 8)</text>
    <g stroke="#cbd5e1" fill="#f8fafc">
      <rect x="0" y="0" width="20" height="20"/><rect x="20" y="0" width="20" height="20"/><rect x="40" y="0" width="20" height="20"/>
      <rect x="60" y="0" width="20" height="20" fill="#e76f51"/><rect x="80" y="0" width="20" height="20"/><rect x="100" y="0" width="20" height="20"/>
      <rect x="120" y="0" width="20" height="20"/><rect x="140" y="0" width="20" height="20"/><rect x="160" y="0" width="20" height="20"/>
      <rect x="180" y="0" width="20" height="20"/><rect x="200" y="0" width="20" height="20"/><rect x="220" y="0" width="20" height="20" fill="#e76f51"/>
      <rect x="240" y="0" width="20" height="20"/><rect x="260" y="0" width="20" height="20"/><rect x="280" y="0" width="20" height="20"/><rect x="300" y="0" width="20" height="20"/>
    </g>
    <!-- RF L=1 (too small) -->
    <path d="M60,30 L60,40 L100,40 L100,30" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="80" y="54" font-size="11" fill="#94a3b8" text-anchor="middle">L=1 RF: misses</text>
    <!-- RF L=4 (covers) -->
    <path d="M60,66 L60,78 L240,78 L240,66" fill="none" stroke="#0d9488" stroke-width="2"/>
    <text x="150" y="94" font-size="11.5" fill="#0d9488" text-anchor="middle">L&#8776;s/2 RF: sees the pair</text>
  </g>

  <!-- accuracy vs depth plot -->
  <g transform="translate(470,80)">
    <text x="120" y="-16" font-size="12.5" font-weight="600" fill="#334155" text-anchor="middle">accuracy vs stack depth (s=8)</text>
    <!-- axes -->
    <line x1="0" y1="120" x2="250" y2="120" stroke="#94a3b8"/>
    <line x1="0" y1="0" x2="0" y2="120" stroke="#94a3b8"/>
    <text x="-8" y="8" font-size="10" fill="#64748b" text-anchor="end">.85</text>
    <text x="-8" y="122" font-size="10" fill="#64748b" text-anchor="end">.50</text>
    <!-- target line at .85 -->
    <line x1="0" y1="0" x2="250" y2="0" stroke="#e76f51" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="252" y="4" font-size="10" fill="#e76f51">target</text>
    <!-- data: L=1..5 acc 0.539 0.591 0.657 0.711 0.783 ; map .50->y120 .85->y0 -> y=120-(a-.5)/.35*120 -->
    <polyline points="20,106.6 80,88.9 140,66.2 200,47.7 250,22.6" fill="none" stroke="#0d9488" stroke-width="2.5"/>
    <g fill="#0d9488">
      <circle cx="20" cy="106.6" r="4"/><circle cx="80" cy="88.9" r="4"/><circle cx="140" cy="66.2" r="4"/><circle cx="200" cy="47.7" r="4"/><circle cx="250" cy="22.6" r="4"/>
    </g>
    <g font-size="10" fill="#64748b" text-anchor="middle">
      <text x="20" y="134">L1</text><text x="80" y="134">L2</text><text x="140" y="134">L3</text><text x="200" y="134">L4</text><text x="250" y="134">L5</text>
    </g>
  </g>

  <text x="20" y="252" font-size="11.5" fill="#94a3b8">Chance until the stack is deep enough to cover the pair, then accuracy lifts off at L &#8776; s/2. Larger s &#8594; deeper stack selected.</text>
</svg>
